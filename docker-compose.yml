services:
  appscreen:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appscreen
    ports:
      - "${PORT}:80"
    restart: unless-stopped
    environment:
      - AUTH_USERNAME=${AUTH_USERNAME:-}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
    volumes:
      # Persists projects, uploaded images, custom fonts, and auth sessions.
      - type: bind
        source: ./data
        target: /app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
