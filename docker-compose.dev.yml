services:
  appscreen:
    build:
      context: .
      dockerfile: Dockerfile
    image: appscreen:dev
    container_name: appscreen-dev
    ports:
      - "${PORT}:80"
    restart: unless-stopped
    environment:
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-admin}
    volumes:
      # Persists projects, uploaded images, custom fonts, and auth sessions.
      - type: bind
        source: ./data
        target: /app/data
      - type: bind
        source: ./src/web
        target: /app/src/web
